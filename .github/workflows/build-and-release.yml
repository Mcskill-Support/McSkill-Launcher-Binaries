name: Build and Release Binaries

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-all:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: ""
          - os: windows-latest
            target: windows-x64
            ext: ".exe"
          - os: macos-latest
            target: macos-x64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            pyinstaller main.py --name "McSkillLauncher" --onefile --windowed --noupx
          else
            pyinstaller main.py --name main-${{ matrix.target }} --onefile --noupx
          fi
        shell: bash

      - name: Package macOS .app
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p build
          cp -R dist/McSkillLauncher.app build/
          cd build
          zip -r ../mcskill-launcher-macos-x64.zip McSkillLauncher.app
        shell: bash

      - name: Move output
        if: matrix.os != 'macos-latest'
        run: |
          mv dist/main-${{ matrix.target }}${{ matrix.ext }} mcskill-launcher-${{ matrix.target }}${{ matrix.ext }}
        shell: bash

      - name: Upload macOS artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mcskill-launcher-macos-x64
          path: mcskill-launcher-macos-x64.zip

      - name: Upload other artifacts
        if: matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: mcskill-launcher-${{ matrix.target }}
          path: mcskill-launcher-${{ matrix.target }}${{ matrix.ext }}

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build inside ARM64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}:/src" \
            -w /src arm64v8/python:3.12 bash -c "
              apt update &&
              apt install -y build-essential curl &&
              pip install -r requirements.txt &&
              pip install pyinstaller &&
              pyinstaller main.py --name main-linux-arm64 --onefile --noupx &&
              mv dist/main-linux-arm64 mcskill-launcher-linux-arm64
            "

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcskill-launcher-linux-arm64
          path: mcskill-launcher-linux-arm64

  release:
    name: Create GitHub Release
    needs: [build-all, build-linux-arm64]
    runs-on: ubuntu-latest

    steps:
      - name: Download specific artifacts
        uses: actions/download-artifact@v4
        with:
          path: final
          merge-multiple: true

      - name: Confirm files
        run: ls -lh final/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.13.0
        with:
          tag: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          artifacts: final/*
